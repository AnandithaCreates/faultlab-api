name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Pull the repository content onto the GitHub Actions runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Standardize the runtime so local and CI behavior stay aligned.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install both application and test dependencies before execution.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Fail the pipeline immediately if tests do not pass.
      - name: Run pytest
        run: pytest
